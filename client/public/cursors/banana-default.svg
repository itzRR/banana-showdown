<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Banana cursor: curved banana shape as a pointer-style arrow -->
  <!-- Stem/tip at top-left (hotspot) -->
  <g transform="rotate(-35, 16, 16)">
    <!-- Banana body -->
    <path d="M 14 4 C 6 6, 4 14, 6 22 C 7 27, 10 30, 14 30 C 18 30, 20 27, 20 22 C 22 14, 20 6, 14 4 Z"
          fill="#FFD633" stroke="#C9A800" stroke-width="1.2"/>
    <!-- Banana highlight -->
    <path d="M 12 7 C 8 10, 7 16, 8 21"
          fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Stem tip -->
    <path d="M 14 4 C 13 2, 15 1, 16 3"
          fill="#7a5c1e" stroke="#5a3e0a" stroke-width="0.8"/>
    <!-- Bottom tip -->
    <path d="M 14 30 C 13 31, 15 32, 16 30"
          fill="#7a5c1e" stroke="#5a3e0a" stroke-width="0.8"/>
  </g>
</svg>
